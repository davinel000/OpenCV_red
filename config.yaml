camera:
  index: 3
  width: 1280
  height: 720
  fps: 30
  video_file: null
  probe_max: 4
  auto_fallback: true
roi:
  mode: manual
  warp_size: 1000
  aruco_dictionary: DICT_4X4_50
  aruco_ids:
  - 0
  - 1
  - 2
  - 3
  roi_cache_path: roi_points.json
preview:
  show_raw: false
  show_warp: true
  show_fps: true
  show_diff: true
  show_mask: true
  show_overlay: true
  window_size: 500
  mosaic: true
  show_controls: true
  simple_controls: false
baseline:
  path: baseline.png
  capture_frames: 30
  capture_delay_ms: 10
detection:
  mode: contrast
  preview_all: false
  preview_only: false
  blur_ksize: 1
  diff_threshold: 9
  morph_open_ksize: 2
  morph_close_ksize: 15
  use_clahe: false
  clahe_clip: 0.8
  clahe_grid: 2
  min_area: 0
  max_area: 200000
  use_aspect: true
  aspect_ratio_min: 0.0
  aspect_ratio_max: 40.0
  use_length: true
  orientation_mode: vertical
  use_orientation: false
  angle_tolerance_deg: 0
  length_min_cm: 5.6
  length_max_cm: 40.0
  red_hue_low1: 0
  red_hue_high1: 10
  red_hue_low2: 170
  red_hue_high2: 179
  red_sat_min: 80
  red_val_min: 50
freeze_mask:
  enabled: true
  dilate_ksize: 5
tracker:
  match_distance_px: 20.0
  min_persist_frames: 14
  cooldown_frames: 43
image_adjust:
  brightness: -100
  contrast: 2.91
  highlights: 0
  shadows: 0
  flicker_strength: 0.37
osc:
  enabled: true
  target_host: 192.168.100.192
  target_port: 9000
  listen_host: 192.168.100.192
  listen_port: 9001
